<div class="register-container">

<h1>Student Registration</h1>

<input
placeholder="Name"
[(ngModel)]="name">

<input
placeholder="Email"
[(ngModel)]="email">

<input
placeholder="Age"
[(ngModel)]="age">

<input
placeholder="Course"
[(ngModel)]="course">

<button>
Register
</button>

<div class="preview">

<h2>Live Preview</h2>

<p>Name: {{name}}</p>

<p>Email: {{email}}</p>

<p>Age: {{age}}</p>

<p>Course: {{course}}</p>

</div>

</div>
